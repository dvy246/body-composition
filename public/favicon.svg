<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Vibrant premium red gradient -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff453a" />
      <stop offset="100%" stop-color="#d90000" />
    </linearGradient>
  </defs>
  <!-- Background: premium squircle/rounded rectangle -->
  <rect width="128" height="128" rx="28" fill="#080c11" />
  
  <!-- Stick Figure -->
  <g stroke="url(#redGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- Spine -->
    <line x1="68" y1="57" x2="62" y2="76" />
    <!-- Left Arm -->
    <line x1="68" y1="57" x2="45" y2="42" />
    <!-- Right Arm -->
    <line x1="68" y1="57" x2="94" y2="58" />
    <!-- Left Leg -->
    <line x1="62" y1="76" x2="44" y2="101" />
    <!-- Right Leg -->
    <line x1="62" y1="76" x2="68" y2="110" />
  </g>
  <!-- Head -->
  <circle cx="72" cy="40" r="10" fill="url(#redGrad)" />
</svg>
